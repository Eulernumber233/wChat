syntax = "proto3";

package message;

// =====================================================================
// Varify Service (used by: VarifyServer, GateServer)
// =====================================================================

service VarifyService {
  rpc GetVarifyCode (GetVarifyReq) returns (GetVarifyRsp) {}
}

message GetVarifyReq {
  string email = 1;
}

message GetVarifyRsp {
  int32 error = 1;
  string email = 2;
  string code = 3;
}

// =====================================================================
// Status Service (used by: StatusServer, GateServer, ChatServer)
// =====================================================================

message GetChatServerReq {
  int32 uid = 1;
}

message GetChatServerRsp {
  int32 error = 1;
  string host = 2;
  string port = 3;
  string token = 4;
  // Added M2: AgentServer (AI smart reply) endpoint, dispatched by StatusServer
  // at the same time as the ChatServer pick. Client stores both.
  // Empty string means "no AgentServer configured" — client should hide
  // AI features in that case.
  string agent_host = 5;
  int32  agent_port = 6;
}

message LoginReq {
  int32 uid = 1;
  string token = 2;
}

message LoginRsp {
  int32 error = 1;
  int32 uid = 2;
  string token = 3;
}

service StatusService {
  rpc GetChatServer(GetChatServerReq) returns (GetChatServerRsp) {}
  rpc Login(LoginReq) returns (LoginRsp);
}

// =====================================================================
// Chat Service (used by: ChatServer instances for cross-server relay)
// =====================================================================

message AddFriendReq {
  int32  applyuid = 1;
  string name = 2;
  string desc = 3;
  string icon = 4;
  string nick = 5;
  int32  sex = 6;
  int32  touid = 7;
  string certification = 8;
}

message AddFriendRsp {
  int32 error = 1;
  int32 applyuid = 2;
  int32 touid = 3;
}

message RplyFriendReq {
  int32 rplyuid = 1;
  bool agree = 2;
  int32 touid = 3;
}

message RplyFriendRsp {
  int32 error = 1;
  int32 rplyuid = 2;
  int32 touid = 3;
}

message SendChatMsgReq {
  int32 fromuid = 1;
  int32 touid = 2;
  string message = 3;
}

message SendChatMsgRsp {
  int32 error = 1;
  int32 fromuid = 2;
  int32 touid = 3;
}

message AuthFriendReq {
  int32 fromuid = 1;
  int32 touid = 2;
}

message AuthFriendRsp {
  int32 error = 1;
  int32 fromuid = 2;
  int32 touid = 3;
}

message TextChatMsgReq {
  int32 fromuid = 1;
  int32 touid = 2;
  repeated TextChatData textmsgs = 3;
}

message TextChatData {
  string msgid = 1;
  string msgcontent = 2;
}

message TextChatMsgRsp {
  int32 error = 1;
  int32 fromuid = 2;
  int32 touid = 3;
  repeated TextChatData textmsgs = 4;
}

// Kick-user messages (cross-server duplicate-login eviction)
message KickUserReq {
  int32  uid    = 1;
  string reason = 2;   // e.g. "duplicate_login"
}

message KickUserRsp {
  int32 error      = 1;
  bool  was_online = 2; // true if the user was actually connected and kicked
}

service ChatService {
  rpc NotifyAddFriend(AddFriendReq) returns (AddFriendRsp) {}
  rpc RplyAddFriend(RplyFriendReq) returns (RplyFriendRsp) {}
  rpc SendChatMsg(SendChatMsgReq) returns (SendChatMsgRsp) {}
  rpc NotifyAuthFriend(AuthFriendReq) returns (AuthFriendRsp) {}
  rpc NotifyTextChatMsg(TextChatMsgReq) returns (TextChatMsgRsp) {}
  rpc NotifyKickUser(KickUserReq) returns (KickUserRsp) {}
}

// =====================================================================
// File Service (FileServer -> ChatServer: notify upload complete)
// =====================================================================

message FileUploadDoneReq {
  string file_id   = 1;
  string file_path = 2;
  string md5       = 3;
  // fromuid is used by FileServer to route this notification to the
  // specific ChatServer instance where the sender currently has a session
  // (looked up via Redis uip_<fromuid>). Without it, FileServer would have
  // to blind-broadcast and the "notify sender" path could silently miss the
  // right instance in a multi-ChatServer deployment.
  int32  fromuid   = 4;
}

message FileUploadDoneRsp {
  int32 error = 1;
}

message FileDownloadAuthReq {
  string file_id    = 1;
  string file_token = 2;
  int32  uid        = 3;
}

message FileDownloadAuthRsp {
  int32 error = 1;
}

service FileService {
  rpc NotifyUploadDone(FileUploadDoneReq) returns (FileUploadDoneRsp) {}
  rpc RegisterDownloadAuth(FileDownloadAuthReq) returns (FileDownloadAuthRsp) {}
}

// =====================================================================
// Agent Data Service (ChatServer -> AgentServer data access)
//
// Hosted by ChatServer on the same gRPC port as ChatService. Called by
// AgentServer (Python) to fetch chat context it needs for LLM prompts.
// Token in metadata or in the request field must equal Redis utoken_<self_uid>.
// =====================================================================

message AgentChatMessageRow {
  // NOTE: int64 on the wire; C++ downstream that re-serializes to JSON
  // (jsoncpp, no asInt64) must use a string round-trip. Python side
  // converts to str when exporting to HTTP clients.
  int64  msg_db_id = 1;
  int32  from_uid  = 2;
  int32  to_uid    = 3;
  int32  msg_type  = 4;  // 1=text 2=image 3=file 4=audio
  string content   = 5;  // raw JSON payload (same shape as stored in MySQL)
  int64  send_time = 6;
  int32  direction = 7;  // 0 incoming, 1 outgoing (relative to self_uid)
}

// 未来可以将 auth_token 放入 Metadata 里
// 保持 RPC 请求参数的纯粹性
// 但目前先放在消息体里，方便 FastAPI 的依赖注入鉴权逻辑复用
message GetChatHistoryReq {
  int32  self_uid         = 1;
  int32  peer_uid         = 2;
  int32  limit            = 3;
  int64  before_msg_db_id = 4;   // 0 = latest page
  string auth_token       = 5;   // utoken_<self_uid>
}

message GetChatHistoryRsp {
  int32 error = 1;
  repeated AgentChatMessageRow messages = 2;
  bool has_more = 3;
}

message GetFriendProfileReq {
  int32  self_uid   = 1;
  int32  peer_uid   = 2;
  string auth_token = 3;
}

message GetFriendProfileRsp {
  int32  error = 1;
  int32  uid   = 2;
  string name  = 3;
  string nick  = 4;
  int32  sex   = 5;
  string desc  = 6;
  string icon  = 7;
}

service AgentDataService {
  rpc GetChatHistory   (GetChatHistoryReq)   returns (GetChatHistoryRsp) {}
  rpc GetFriendProfile (GetFriendProfileReq) returns (GetFriendProfileRsp) {}
}
